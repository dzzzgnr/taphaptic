name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go + Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go Tests
        run: go test ./... -count=1

      - name: Build Local API
        run: go build -o ./bin/taphaptic-api ./cmd/taphaptic-api

      - name: Run Local E2E Smoke
        run: ./scripts/smoke-local-e2e.sh

  apple-build:
    name: Apple (Watch Build + Swift Tests)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Watch App (Simulator)
        run: ./scripts/build-watch-app.sh

      - name: Run Shared Swift Regression Tests
        run: ./scripts/test-shared-swift.sh
