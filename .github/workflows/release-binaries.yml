name: Release Binaries

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish-macos-binaries:
    name: Publish signed + notarized macOS binaries
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          set -eu
          mkdir -p dist
          for arch in arm64 amd64; do
            GOOS=darwin GOARCH="$arch" CGO_ENABLED=0 go build -o "dist/taphapticctl_darwin_${arch}" ./cmd/taphapticctl
            GOOS=darwin GOARCH="$arch" CGO_ENABLED=0 go build -o "dist/taphaptic-api_darwin_${arch}" ./cmd/taphaptic-api
          done

      - name: Import signing certificate
        env:
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          set -eu
          : "${MACOS_SIGNING_CERT_BASE64:?Set GitHub secret MACOS_SIGNING_CERT_BASE64}"
          : "${MACOS_SIGNING_CERT_PASSWORD:?Set GitHub secret MACOS_SIGNING_CERT_PASSWORD}"

          cert_path="$RUNNER_TEMP/taphaptic-signing.p12"
          keychain_path="$RUNNER_TEMP/taphaptic-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"

          if ! printf '%s' "$MACOS_SIGNING_CERT_BASE64" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$MACOS_SIGNING_CERT_BASE64" | base64 -D > "$cert_path"
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          login_keychain="$HOME/Library/Keychains/login.keychain-db"
          if [ ! -f "$login_keychain" ]; then
            login_keychain="$HOME/Library/Keychains/login.keychain"
          fi
          security list-keychains -d user -s "$keychain_path" "$login_keychain"
          security default-keychain -d user -s "$keychain_path"

      - name: Sign binaries
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -eu
          : "${MACOS_SIGNING_IDENTITY:?Set GitHub secret MACOS_SIGNING_IDENTITY}"

          for binary in dist/taphapticctl_darwin_arm64 dist/taphapticctl_darwin_amd64 dist/taphaptic-api_darwin_arm64 dist/taphaptic-api_darwin_amd64; do
            codesign --force --timestamp --options runtime --sign "$MACOS_SIGNING_IDENTITY" "$binary"
            codesign --verify --strict --verbose=2 "$binary"
          done

      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eu
          : "${APPLE_ID:?Set GitHub secret APPLE_ID}"
          : "${APPLE_APP_SPECIFIC_PASSWORD:?Set GitHub secret APPLE_APP_SPECIFIC_PASSWORD}"
          : "${APPLE_TEAM_ID:?Set GitHub secret APPLE_TEAM_ID}"

          mkdir -p dist/notary
          for binary in dist/taphapticctl_darwin_arm64 dist/taphapticctl_darwin_amd64 dist/taphaptic-api_darwin_arm64 dist/taphaptic-api_darwin_amd64; do
            zip_path="dist/notary/$(basename "$binary").zip"
            ditto -c -k --keepParent "$binary" "$zip_path"
            xcrun notarytool submit "$zip_path" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            spctl --assess --type execute --verbose=4 "$binary"
          done

      - name: Generate checksums
        run: |
          set -eu
          shasum -a 256 dist/taphapticctl_darwin_arm64 dist/taphapticctl_darwin_amd64 dist/taphaptic-api_darwin_arm64 dist/taphaptic-api_darwin_amd64 > dist/SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/taphapticctl_darwin_arm64
            dist/taphapticctl_darwin_amd64
            dist/taphaptic-api_darwin_arm64
            dist/taphaptic-api_darwin_amd64
            dist/SHA256SUMS
