name: Taphaptic
options:
  bundleIdPrefix: local.taphaptic
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  Taphaptic:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: watch-app
      - path: shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.taphaptic.watch
        PRODUCT_NAME: Taphaptic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Taphaptic
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Taphaptic discovers your Mac on the local network for pairing.
        INFOPLIST_KEY_NSBonjourServices:
          - _taphaptic._tcp
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        SDKROOT: watchos
  TaphapticSharedTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: shared
      - path: tests/swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.taphaptic.sharedtests
        PRODUCT_NAME: TaphapticSharedTests
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      gatherCoverageData: false
schemes:
  Taphaptic:
    build:
      targets:
        Taphaptic: all
    run:
      config: Debug
      debugEnabled: false
      disableMainThreadChecker: true
      disableThreadPerformanceChecker: true
    test:
      gatherCoverageData: false
  TaphapticLLDB:
    build:
      targets:
        Taphaptic: all
    run:
      config: Debug
      debugEnabled: true
    test:
      gatherCoverageData: false
  TaphapticRegressionTests:
    build:
      targets:
        TaphapticSharedTests: all
    test:
      gatherCoverageData: false
      targets:
        - name: TaphapticSharedTests
